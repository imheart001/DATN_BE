services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: datn-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - datn

  nginx:
    image: nginx:1.27-alpine
    container_name: datn-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - datn

  mysql:
    image: mysql:8.0
    container_name: datn-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-project}
      MYSQL_USER: ${MYSQL_USER:-datn}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD:-root}}
    ports:
      - "${FORWARD_DB_PORT:-33060}:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-${DB_PASSWORD:-root}}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - datn

  redis:
    image: redis:7-alpine
    container_name: datn-redis
    ports:
      - "${FORWARD_REDIS_PORT:-63790}:6379"
    volumes:
      - redis-data:/data
    networks:
      - datn

  mailpit:
    image: axllent/mailpit:latest
    container_name: datn-mailpit
    ports:
      - "${MAIL_PORT:-1025}:1025"
      - "${MAILPIT_PORT:-8025}:8025"
    networks:
      - datn

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: datn-queue
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=120
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - datn

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: datn-scheduler
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - datn

networks:
  datn:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
